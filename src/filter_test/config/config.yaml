/filter:
  ros__parameters:
    # CV模型过程噪声参数
    s2qxy_cv: 0.1
    s2qz_cv: 0.1
    s2qyaw_cv: 0.5
    s2qr_cv: 10.0
    s2qdz_cv: 0.1

    # Singer模型过程噪声参数
    s2qxy_singer: 0.05
    s2qz_singer: 0.05
    s2qyaw_singer: 0.1
    s2qr_singer: 10.0
    s2qdz_singer: 0.01
    tau_singer: 2.0

    # UKF参数
    ukf_alpha: 0.01
    ukf_beta: 2.0
    ukf_kappa: 0.0

    # 仿真模式R参数（固定R，无PnP误差）

    # 检测器模式R参数（距离相关R，有PnP误差）
    r_pose_det: 0.01
    r_distance_det: 0.01
    r_yaw_det: 0.05

    init_r: 0.25
    
    # 滤波器选择参数
    use_ekf: false
    use_cv_model: true

/graph_optimizer_test:
  ros__parameters:
    # 观测模式选择
    use_2d_observation: true  # true=两级像素观测(多装甲板)，false=YPD几何观测

    verbose: false            # 关闭 [GO] 调试输出

    # CV模型过程噪声参数 (对角噪声: 方差)
    s2qxy: 0.1         # σ_pos=0.32m (松噪声适应 6D 密集团结构)
    s2qz: 0.1          # σ_pos_z=0.32m
    s2qyaw: 0.1        # σ_yaw=0.32rad
    s2qr: 10.0
    s2qdz: 0.1

    # 速度平滑噪声 (对角噪声模型: 方差)
    s2qvel: 0.0001      # σ_vel=0.01m/s (对齐 jlu velocity_factor_noise)
    s2qvyaw: 0.0025     # σ_vyaw=0.05rad/s (对齐 jlu vyaw_factor_noise)
    vel_sigma: 0.01     # VelSmoothFactor 标准差
    vyaw_sigma: 0.05    # VyawSmoothFactor 标准差

    # 仿真模式R参数
    r_pose: 0.001
    r_distance: 0.001
    r_yaw: 0.01

    # 像素噪声（用于2D观测模式）
    pixel_noise_std: 1.0

    # 冷启动帧数 (2D观测模式)
    cold_start_frames: 3

    # 固定滞后平滑器: 0=纯iSAM2无边际化, N=保留N帧
    smoother_lag: 10.0        # 0=纯ISAM2 (先验证收敛)
    smoother_type: "incremental"  # "incremental" (iSAM2,快) 或 "batch" (LM,稳)
    extra_iterations: 2      # 每次update后额外iSAM2迭代 (GTSAM示例推荐2-3次)
    max_window_frames: 400   # 周期性重置ISAM2 (0=不限制)
    relinearize_threshold: 0.001  # 更频繁重线性化 (ISAM2 默认 0.01)

    # 几何约束噪声 [tangential, radial, z, yaw]
    geo_tangential: 0.01
    geo_radial: 0.03
    geo_height: 0.01
    geo_yaw: 0.05     # 放宽防止 yaw 约束过强 (4000:1 vs 运动因子) 导致数值奇异

    # 相机内参 (外参从 TF 树 odom→camera_optical_frame 动态获取)
    camera_fx: 2411.0
    camera_fy: 2411.0
    camera_cx: 720.0
    camera_cy: 640.0

    # 畸变系数
    distortion_k1: -0.093
    distortion_k2: 0.154
    distortion_p1: 0.0001
    distortion_p2: -0.0006
/jlu_tracker:
  ros__parameters:
    # 冷启动帧数 (对齐 jlu_vision_26 默认 5, 保证静态变量充分收敛)
    cold_start_frames: 5

/gimbal_simulation:
  ros__parameters:
    publish_rate: 200
