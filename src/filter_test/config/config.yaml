/filter:
  ros__parameters:
    # 数据源选择
    use_simulation: true   # true=模拟器（固定R），false=检测器（距离相关R）

    # CV模型过程噪声参数
    s2qxy_cv: 0.1
    s2qz_cv: 0.1
    s2qyaw_cv: 0.1
    s2qr_cv: 10.0
    s2qdz_cv: 0.1

    # Singer模型过程噪声参数
    s2qxy_singer: 0.05
    s2qz_singer: 0.05
    s2qyaw_singer: 0.01
    s2qr_singer: 5.0
    s2qdz_singer: 0.01
    tau_singer: 2.0

    # UKF参数
    ukf_alpha: 0.01
    ukf_beta: 2.0
    ukf_kappa: 0.0

    # 仿真模式R参数（固定R，无PnP误差）
    r_pose_sim: 0.001
    r_distance_sim: 0.001
    r_yaw_sim: 0.001

    # 检测器模式R参数（距离相关R，有PnP误差）
    r_pose_det: 0.01
    r_distance_det: 0.01
    r_yaw_det: 0.01

    init_r: 0.25
    
    # 滤波器选择参数
    use_ekf: false
    use_cv_model: false

/graph_optimizer_test:
  ros__parameters:
    # 观测模式选择
    use_2d_observation: true  # true=两级像素观测(多装甲板)，false=YPD几何观测

    # CV模型过程噪声参数
    s2qxy: 0.1
    s2qz: 0.1
    s2qyaw: 0.1
    s2qr: 10.0
    s2qdz: 0.1

    # 仿真模式R参数
    r_pose: 0.001
    r_distance: 0.001
    r_yaw: 0.001

    # 像素噪声（用于2D观测模式）
    pixel_noise_std: 1.0

    # 冷启动帧数 (2D观测模式)
    cold_start_frames: 3

    # 几何约束噪声 [tangential, radial, z, yaw]
    geo_tangential: 0.01
    geo_radial: 0.03
    geo_height: 0.01
    geo_yaw: 0.005

    # 相机内参 (外参从 TF 树 odom→camera_optical_frame 动态获取)
    camera_fx: 2411.0
    camera_fy: 2411.0
    camera_cx: 720.0
    camera_cy: 640.0

    # 畸变系数
    distortion_k1: -0.093
    distortion_k2: 0.154
    distortion_p1: 0.0001
    distortion_p2: -0.0006
    use_distortion: true

/gimbal_simulation:
  ros__parameters:
    use_ground_truth_tracking: true